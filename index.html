<head>

<title>ito-line</title>

<style>
  :root{
    --bg:#1B1F3B;
    --bg-soft:#262B52;
    --bg-soft2:#30356a;
    --card:#F7EFE3;
    --card-edge:#E4D7BE;
    --ink:#2B2440;
    --ink-soft:#5b5470;
    --thread:#E8714A;
    --thread-dark:#c75a36;
    --mustard:#E8B339;
    --good:#5C9C72;
    --bad:#C75450;
    --muted:#9893B5;
    --white:#fffaf2;
    --display:'Zen Maru Gothic', sans-serif;
    --hand:'Klee One', cursive;
    --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 8%, rgba(255,255,255,0.06) 0, transparent 2.5%),
      radial-gradient(circle at 75% 18%, rgba(255,255,255,0.05) 0, transparent 2%),
      radial-gradient(circle at 40% 30%, rgba(255,255,255,0.04) 0, transparent 1.8%),
      radial-gradient(circle at 90% 60%, rgba(255,255,255,0.05) 0, transparent 2%),
      radial-gradient(circle at 25% 75%, rgba(255,255,255,0.04) 0, transparent 1.8%),
      radial-gradient(circle at 60% 90%, rgba(255,255,255,0.05) 0, transparent 2%),
      linear-gradient(160deg, var(--bg) 0%, var(--bg-soft2) 100%);
    background-attachment:fixed;
    font-family:var(--display);
    color:var(--white);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  *:focus-visible{outline:2px solid var(--mustard); outline-offset:2px;}
  .shell{max-width:480px;margin:0 auto;padding:22px 16px 56px;min-height:100vh;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .brand{font-weight:900;font-size:22px;letter-spacing:0.5px;display:flex;align-items:center;gap:8px;}
  .brand .thread-dot{width:10px;height:10px;border-radius:50%;background:var(--thread);box-shadow:0 0 0 3px rgba(232,113,74,0.25);}
  .linkbtn{background:none;border:none;color:var(--muted);font-family:var(--display);font-size:13px;cursor:pointer;padding:6px 8px;border-radius:8px;}
  .linkbtn:hover{color:var(--white);background:rgba(255,255,255,0.06);}
  h1{font-size:26px;margin:8px 0 4px;font-weight:900;}
  h2{font-size:19px;margin:0 0 10px;font-weight:700;}
  p.subtitle{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.7;}
  .card{
    background:var(--card);
    color:var(--ink);
    border-radius:16px;
    padding:18px 18px;
    box-shadow:0 10px 26px rgba(0,0,0,0.28);
    border:1px solid var(--card-edge);
    margin-bottom:14px;
  }
  .field{margin-bottom:14px;}
  .label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;font-weight:700;}
  .input{
    width:100%;
    padding:12px 13px;
    border-radius:10px;
    border:1.5px solid var(--card-edge);
    background:var(--white);
    color:var(--ink);
    font-family:var(--display);
    font-size:15px;
  }
  .input:focus{border-color:var(--thread);}
  .input.mono{font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;}
  textarea.input{resize:none;font-family:var(--hand);font-size:17px;min-height:54px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:none;border-radius:12px;padding:13px 18px;font-family:var(--display);
    font-weight:700;font-size:15px;cursor:pointer;width:100%;
    transition:transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-primary{background:var(--mustard);color:#2B2440;box-shadow:0 4px 0 #b8862099;}
  .btn-secondary{background:var(--thread);color:var(--white);box-shadow:0 4px 0 #9c4a2c99;}
  .btn-ghost{background:rgba(255,255,255,0.08);color:var(--white);}
  .btn-sm{width:auto;padding:8px 12px;font-size:13px;border-radius:9px;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .helper{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6;}
  .error{font-size:13px;color:#ffb4ad;background:rgba(199,84,80,0.18);border:1px solid rgba(199,84,80,0.4);padding:10px 12px;border-radius:10px;margin-bottom:14px;}
  .room-code{
    font-family:var(--mono);font-weight:700;font-size:34px;letter-spacing:6px;text-align:center;
    background:var(--white);color:var(--ink);border-radius:12px;padding:14px 0;border:2px dashed var(--thread);
  }
  .topic-chip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  .topic-chip{
    background:var(--white);border:1.5px solid var(--card-edge);border-radius:10px;padding:10px 10px;
    font-size:13px;text-align:left;cursor:pointer;color:var(--ink);font-family:var(--display);
  }
  .topic-chip small{display:block;color:var(--ink-soft);font-size:11px;margin-top:3px;}
  .topic-chip.selected{border-color:var(--thread);border-width:2.5px;background:#fff3ea;font-weight:700;box-shadow:0 0 0 3px rgba(232,113,74,0.22);}
  .topic-chip.selected::after{content:'✓';float:right;color:var(--thread);font-weight:900;}
  .seg{display:flex;background:rgba(255,255,255,0.08);border-radius:11px;padding:4px;gap:4px;margin-bottom:10px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);padding:8px 2px;border-radius:8px;font-family:var(--display);font-size:11.5px;font-weight:700;cursor:pointer;}
  .seg button.active{background:var(--mustard);color:#2B2440;}
  .player-list{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px;}
  .player-chip{background:rgba(255,255,255,0.09);border-radius:20px;padding:7px 13px;font-size:13px;display:flex;align-items:center;gap:6px;}
  .player-chip .host-star{color:var(--mustard);}
  .topic-banner{
    background:linear-gradient(135deg, var(--mustard), #f2c862);
    color:#2B2440;border-radius:14px;padding:14px 16px;margin-bottom:14px;text-align:center;
  }
  .topic-banner .ttext{font-size:18px;font-weight:900;}
  .topic-banner .scale{display:flex;justify-content:space-between;font-size:12px;margin-top:8px;color:#5a4413;font-weight:700;}
  .number-stage{text-align:center;padding:26px 0 10px;}
  .number-stage .lab{font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  .number-display{
    font-family:var(--mono);font-weight:700;font-size:64px;color:var(--ink);
    animation:popin 0.35s ease;
  }
  @keyframes popin{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .round-pill{display:inline-block;background:rgba(255,255,255,0.1);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted);margin-bottom:10px;}
  .history-dots{display:flex;gap:5px;margin-bottom:10px;}
  .history-dots span{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .order-anchor{display:flex;align-items:center;justify-content:space-between;padding:6px 22px 6px 34px;font-size:13px;font-weight:700;color:var(--muted);}
  .order-anchor-top{border-bottom:1px dashed rgba(255,255,255,0.08);margin-bottom:6px;padding-bottom:8px;}
  .order-anchor-bottom{border-top:1px dashed rgba(255,255,255,0.08);margin-top:-4px;padding-top:8px;margin-bottom:14px;}
  .thread-wrap{position:relative;padding-left:22px;margin-top:6px;}
  .thread-wrap::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:3px;background:repeating-linear-gradient(to bottom, var(--thread) 0 8px, transparent 8px 14px);border-radius:3px;}
  .order-card{
    position:relative;background:var(--card);border:1px solid var(--card-edge);border-radius:13px;
    padding:12px 14px 12px 16px;margin-bottom:18px;box-shadow:0 6px 14px rgba(0,0,0,0.22);
  }
  .order-card:nth-child(odd){transform:rotate(-0.6deg);}
  .order-card:nth-child(even){transform:rotate(0.6deg);}
  .order-card::before{
    content:'';position:absolute;left:-22px;top:14px;width:13px;height:13px;border-radius:50%;
    background:var(--thread-dark);box-shadow:0 0 0 3px var(--bg-soft2);
  }
  .order-card .ocname{font-weight:700;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;justify-content:space-between;}
  .order-card .occlue{font-family:var(--hand);font-size:19px;color:var(--ink);margin-top:4px;min-height:24px;}
  .order-card .ocnum{font-family:var(--mono);font-weight:700;font-size:22px;color:var(--thread-dark);margin-top:4px;}
  .order-controls{display:flex;flex-direction:column;gap:4px;}
  .order-controls button{
    width:30px;height:26px;border-radius:7px;border:none;background:rgba(43,36,64,0.08);
    color:var(--ink);font-size:13px;cursor:pointer;
  }
  .order-controls button:disabled{opacity:0.25;}
  .oc-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .connector{display:flex;align-items:center;gap:6px;margin:-10px 0 8px 0;padding-left:22px;font-size:12px;color:var(--muted);}
  .connector.ok{color:var(--good);}
  .connector.bad{color:#ff9d96;}
  .result-banner{border-radius:14px;padding:18px;text-align:center;margin-bottom:16px;}
  .result-banner.success{background:linear-gradient(135deg,#5C9C72,#7fbf8f);color:#0f2c18;}
  .result-banner.fail{background:linear-gradient(135deg,#C75450,#e08a86);color:#321210;}
  .result-banner .big{font-size:22px;font-weight:900;}
  footer.note{margin-top:auto;padding-top:30px;text-align:center;font-size:11.5px;color:var(--muted);line-height:1.7;}
  .help-box{background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.85;color:#dcd9ee;}
  .help-box ol{margin:6px 0 0;padding-left:20px;}
  .count-stepper{display:flex;align-items:center;gap:14px;justify-content:center;}
  .count-stepper button{width:38px;height:38px;border-radius:10px;border:none;background:var(--white);color:var(--ink);font-size:18px;font-weight:700;cursor:pointer;}
  .count-stepper .num{font-family:var(--mono);font-size:24px;font-weight:700;}
  .name-rows{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .copy-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .lang-row{display:flex;gap:8px;margin-bottom:18px;}
  .lang-row button{flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--white);font-family:var(--display);font-weight:700;font-size:14px;cursor:pointer;}
  .lang-row button.active{background:var(--mustard);color:#2B2440;border-color:var(--mustard);}
  .checkbox-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--ink-soft);margin:10px 0 4px;line-height:1.5;}
  .checkbox-row input{margin-top:3px;flex-shrink:0;}
  .bank-item{background:var(--card);border:1px solid var(--card-edge);border-radius:12px;padding:12px 14px;margin-bottom:10px;color:var(--ink);}
  .bank-item .bname{font-family:var(--hand);font-size:17px;}
  .bank-item .bscale{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .help-step{display:flex;gap:14px;align-items:flex-start;background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:10px;}
  .help-step-num{width:28px;height:28px;border-radius:50%;background:var(--thread);color:var(--white);font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .help-step-title{font-weight:700;font-size:15px;margin-bottom:4px;}
  .help-step-desc{font-size:13px;color:#dcd9ee;line-height:1.7;}
  .help-tip-box{background:rgba(232,179,57,0.12);border:1px solid rgba(232,179,57,0.3);border-radius:14px;padding:14px 16px;margin-top:6px;}
  .help-tip-title{font-weight:700;font-size:14px;margin-bottom:8px;color:var(--mustard);}
  .help-tip-box ul{margin:0;padding-left:18px;font-size:13px;color:#dcd9ee;line-height:1.85;}
  .oath-card{background:#1a2044;border:2.5px solid var(--mustard);border-radius:16px;padding:20px 18px 14px;margin-top:18px;box-shadow:0 8px 24px rgba(0,0,0,0.35);}
  .oath-header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
  .oath-logo{font-family:var(--hand);font-size:28px;font-weight:700;color:var(--mustard);letter-spacing:-1px;}
  .oath-title{font-size:14px;font-weight:700;color:var(--mustard);}
  .oath-list{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:14px;counter-reset:oath-counter;}
  .oath-list li{font-size:15px;font-weight:700;color:var(--white);line-height:1.6;padding-left:22px;position:relative;}
  .oath-list li::before{content:counter(oath-counter) '.';counter-increment:oath-counter;position:absolute;left:0;color:var(--mustard);font-weight:900;font-size:13px;}
  .oath-note{font-size:11px;color:rgba(255,255,255,0.35);margin-top:14px;text-align:right;}
  .toast-ok{font-size:13px;color:#bfe8cc;background:rgba(92,156,114,0.18);border:1px solid rgba(92,156,114,0.4);padding:9px 12px;border-radius:10px;margin-bottom:12px;}
  @media (prefers-reduced-motion: no-preference){
    .order-card{animation:settle 0.3s ease;}
  }
  @keyframes settle{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

/* ---------- utils ---------- */
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sampleNumbers(n){const pool=Array.from({length:100},(_,i)=>i+1);return shuffle(pool).slice(0,n);}
function pickRandomTopic(used,l){used=used||[];let pool=topicsFor(l).filter(t=>!used.includes(t.text));if(pool.length===0)pool=topicsFor(l);return pool[Math.floor(Math.random()*pool.length)];}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---------- realtime sync helpers ---------- */
let syncError=false;
let busy=false;
let lastFailedAction=null;
let roomUnsub=null;

function isTyping(){const a=document.activeElement;return a && (a.tagName==='INPUT'||a.tagName==='TEXTAREA');}
document.addEventListener('focusout', ()=>{ if(pendingRender){ pendingRender=false; render(); } });

function attachRoomListener(code){
  detachRoomListener();
  roomUnsub = onValue(roomRef(code), (snap)=>{
    const val = snap.val();
    if(!val) return;
    room = val;
    if(isTyping()) pendingRender=true; else render();
  }, (err)=>{
    console.error(err);
    syncError = true;
    errorMsg = t('err_connFail');
    render();
  });
}
function detachRoomListener(){ if(roomUnsub){ roomUnsub(); roomUnsub=null; } }

async function safeWrite(writeFn){
  try{
    await writeFn();
    syncError=false; errorMsg=''; lastFailedAction=null;
    return true;
  }catch(e){
    console.error(e);
    syncError = true;
    lastFailedAction = ()=>safeWrite(writeFn);
    errorMsg = (e && e.code==='PERMISSION_DENIED') ? t('err_permissionDenied') : t('err_saveGeneric');
    render();
    return false;
  }
}
function retrySync(){ if(lastFailedAction) lastFailedAction(); }

/* ---------- community topic bank ---------- */
let communityPickCache={ja:null, en:null};   // one-off cache used while choosing a topic in-game
let communitySampleCache={ja:[], en:[]};
let bankList=[];
let bankUnsub=null;
let bankJustAdded=false;

async function ensureCommunityPickLoaded(l){
  if(communityPickCache[l]){ refreshCommunitySample(l); render(); return; }
  communityPickCache[l]=[];
  try{
    const snap = await get(communityRef(l));
    const val = snap.val()||{};
    communityPickCache[l] = Object.keys(val).map(id=>({id, ...val[id]}));
  }catch(e){ console.error(e); communityPickCache[l]=[]; }
  refreshCommunitySample(l);
  render();
}
function refreshCommunitySample(l){
  communitySampleCache[l] = shuffle(communityPickCache[l]||[]).slice(0,8);
}
function communityShuffle(){ refreshCommunitySample(currentLang()); render(); }

function attachBankListener(l){
  detachBankListener();
  bankUnsub = onValue(communityRef(l), (snap)=>{
    const val = snap.val()||{};
    bankList = Object.keys(val).map(id=>({id, ...val[id]})).sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
    render();
  }, (err)=>{ console.error(err); });
}
function detachBankListener(){ if(bankUnsub){ bankUnsub(); bankUnsub=null; } bankList=[]; }

async function bankAddTopic(){
  const l=currentLang();
  const text=(document.getElementById('bank-text').value||'').trim().slice(0,28);
  const low=(document.getElementById('bank-low').value||'').trim().slice(0,10)||defaultLow(l);
  const high=(document.getElementById('bank-high').value||'').trim().slice(0,10)||defaultHigh(l);
  if(!text){ errorMsg=t('err_topicTextRequired'); syncError=false; render(); return; }
  errorMsg=''; render();
  const ok = await safeWrite(()=>push(communityRef(l), {text, low, high, addedAt: Date.now()}));
  if(ok){
    ['bank-text','bank-low','bank-high'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    bankJustAdded=true; render();
    setTimeout(()=>{ bankJustAdded=false; render(); }, 2200);
  }
}

}

/* ---------- online actions ---------- */
async function createRoomAction(){
  if(busy) return;
  busy=true; errorMsg=''; syncError=false; render();
  const name=(document.getElementById('cr-name').value||'').trim().slice(0,12) || (lang==='en' ? 'Player 1' : 'プレイヤー1');
  myName=name;
  let code='', tries=0, taken=true;
  try{
    while(taken && tries<5){
      code=genCode();
      const snap=await get(roomRef(code));
      taken=snap.exists();
      tries++;
    }
  }catch(e){ code=genCode(); }
  const r={
    code, hostId:myId, phase:'lobby', topicMode:'presetRandom', pendingTopic:null, lang:lang,
    players:{ [myId]:{name, number:null, clue:'', submitted:false, joinedAt:Date.now()} },
    order:[], topic:null, round:0, usedTopics:[], lastResult:null, history:[]
  };
  room=r; onlineStep='room'; render();
  attachRoomListener(code);
  await safeWrite(()=>set(roomRef(code), r));
  busy=false; render();
}
async function joinRoomAction(){
  if(busy) return;
  const codeRaw=(document.getElementById('jr-code').value||'').trim().toUpperCase();
  const name=(document.getElementById('jr-name').value||'').trim().slice(0,12) || (lang==='en'?'Guest':'ゲスト');
  if(!codeRaw){ errorMsg=t('err_codeRequired'); syncError=false; render(); return; }
  busy=true; errorMsg=''; syncError=false; render();
  let snap=null;
  try{ snap = await get(roomRef(codeRaw)); }catch(e){ console.error(e); }
  if(!snap || !snap.exists()){
    errorMsg=t('err_roomNotFound');
    syncError=false; busy=false; render(); return;
  }
  const r = snap.val();
  myName=name;
  r.players = r.players || {};
  r.players[myId] = {name, number:null, clue:'', submitted:false, joinedAt:Date.now()};
  room=r; onlineStep='room'; render();
  attachRoomListener(codeRaw);
  await safeWrite(()=>update(roomRef(codeRaw), {['players/'+myId]: r.players[myId]}));
  busy=false; render();
}
function isHost(){ return room && room.hostId===myId; }

function hostSetTopicMode(m){
  if(!isHost())return;
  room.topicMode=m; room.pendingTopic=null; render();
  if(m==='community') ensureCommunityPickLoaded(currentLang());
  safeWrite(()=>update(roomRef(room.code), {topicMode:m, pendingTopic:null}));
}
function hostChoosePreset(idx){
  if(!isHost())return;
  const tp = topicsFor(currentLang())[idx];
  room.pendingTopic=tp; render();
  safeWrite(()=>update(roomRef(room.code), {pendingTopic:tp}));
}
function hostChooseCommunity(idx){
  if(!isHost())return;
  const c=(communitySampleCache[currentLang()]||[])[idx];
  if(!c) return;
  const tp={text:c.text, low:c.low, high:c.high};
  room.pendingTopic=tp; render();
  safeWrite(()=>update(roomRef(room.code), {pendingTopic:tp}));
}
function hostSaveCustomTopic(){
  if(!isHost())return;
  const l=currentLang();
  const text=(document.getElementById('ct-text').value||'').trim().slice(0,28);
  const low=(document.getElementById('ct-low').value||'').trim().slice(0,10)||defaultLow(l);
  const high=(document.getElementById('ct-high').value||'').trim().slice(0,10)||defaultHigh(l);
  const share=!!(document.getElementById('ct-share')||{}).checked;
  if(!text){ errorMsg=t('err_topicTextRequired'); syncError=false; render(); return; }
  room.pendingTopic={text, low, high};
  errorMsg=''; render();
  safeWrite(()=>update(roomRef(room.code), {pendingTopic:room.pendingTopic}));
  if(share) safeWrite(()=>push(communityRef(l), {text, low, high, addedAt:Date.now()}));
}
function hostStartRound(){
  if(!isHost())return;
  const l=currentLang();
  const ids=Object.keys(room.players);
  if(ids.length<2){ errorMsg=t('err_needTwoPlayers'); syncError=false; render(); return; }
  let topic=room.pendingTopic;
  if(room.topicMode==='presetRandom' || !topic){
    topic=pickRandomTopic(room.usedTopics, l);
    room.usedTopics=(room.usedTopics||[]).concat([topic.text]);
  }
  const nums=sampleNumbers(ids.length);
  const updates={};
  shuffle(ids).forEach((id,i)=>{
    room.players[id].number=nums[i];
    room.players[id].clue='';
    room.players[id].submitted=false;
    updates['players/'+id+'/number']=nums[i];
    updates['players/'+id+'/clue']='';
    updates['players/'+id+'/submitted']=false;
  });
  room.topic=topic;
  room.pendingTopic=null;
  room.phase='clue';
  room.round=(room.round||0)+1;
  room.order=shuffle(ids);
  room.lastResult=null;
  Object.assign(updates, {topic, pendingTopic:null, phase:'clue', round:room.round, order:room.order, lastResult:null, usedTopics:room.usedTopics});
  errorMsg=''; render();
  safeWrite(()=>update(roomRef(room.code), updates));
}
function submitClueAction(){
  const text=(document.getElementById('clue-input').value||'').trim();
  room.players[myId].clue=text;
  room.players[myId].submitted=true;
  const all=Object.values(room.players).every(p=>p.submitted);
  const updates={};
  updates['players/'+myId+'/clue']=text;
  updates['players/'+myId+'/submitted']=true;
  if(all){ room.phase='order'; updates.phase='order'; }
  render();
  safeWrite(()=>update(roomRef(room.code), updates));
}
function moveOrder(idx,dir){
  const o=room.order.slice();
  const j=idx+dir;
  if(j<0||j>=o.length)return;
  [o[idx],o[j]]=[o[j],o[idx]];
  room.order=o; render();
  safeWrite(()=>update(roomRef(room.code), {order:o}));
}
function hostReveal(){
  if(!isHost())return;
  const o=room.order;
  let success=true;
  for(let i=0;i<o.length-1;i++){
    if(room.players[o[i]].number > room.players[o[i+1]].number){ success=false; break; }
  }
  room.phase='reveal';
  room.lastResult={success};
  room.history=(room.history||[]).concat([success]);
  render();
  safeWrite(()=>update(roomRef(room.code), {phase:'reveal', lastResult:{success}, history:room.history}));
}
function hostNextRound(){
  if(!isHost())return;
  room.phase='lobby';
  room.lastResult=null; render();
  safeWrite(()=>update(roomRef(room.code), {phase:'lobby', lastResult:null}));
}
function copyCode(){
  const code=room.code;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(()=>{
      const el=document.getElementById('copy-status'); if(el) el.textContent=t('copiedText');
    }).catch(()=>{ const el=document.getElementById('copy-status'); if(el) el.textContent=t('copyFallbackText'); });
  }
}

function setLocalCount(delta){
  localCount=Math.max(2,Math.min(8,localCount+delta));
  while(localNames.length<localCount) localNames.push('');
  localNames=localNames.slice(0,localCount);
  render();
}
function startLocalGame(){
  const players={};
  for(let i=0;i<localCount;i++){
    const nm=(document.getElementById('ln-'+i).value||'').trim().slice(0,12) || playerPlaceholder(i+1);
    players[String(i)]={name:nm, number:null, clue:''};
  }
  const topicMode = local && local.topicMode ? local.topicMode : 'presetRandom';
  const pendingTopic = local ? local.pendingTopic : null;
  const gameLang = lang;
  local={
    players, topicMode, pendingTopic, topic:null,
    phase:'pass', round:0, order:[], passIdx:0, usedTopics:[], history:[], lang:gameLang
  };
  beginLocalRound();
  localStep='playing';
  render();
}
function beginLocalRound(){
  const l=currentLang();
  const ids=Object.keys(local.players);
  let topic=local.pendingTopic;
  if(local.topicMode==='presetRandom' || !topic){
    topic=pickRandomTopic(local.usedTopics, l);
    local.usedTopics=(local.usedTopics||[]).concat([topic.text]);
  }
  const nums=sampleNumbers(ids.length);
  shuffle(ids).forEach((id,i)=>{ local.players[id].number=nums[i]; local.players[id].clue=''; });
  local.topic=topic;
  local.pendingTopic=null;
  local.phase='pass';
  local.passIdx=0;
  local.round=(local.round||0)+1;
  local.order=shuffle(ids);
}
function localRevealOwnNumber(){ local.phase='pass-show'; render(); }
function localSubmitClue(){
  const ids=Object.keys(local.players);
  const id=ids[local.passIdx];
  const text=(document.getElementById('lc-input').value||'').trim();
  local.players[id].clue=text;
  local.passIdx++;
  local.phase = (local.passIdx>=ids.length) ? 'order' : 'pass';
  render();
}
function localMoveOrder(idx,dir){
  const o=local.order.slice();
  const j=idx+dir;
  if(j<0||j>=o.length)return;
  [o[idx],o[j]]=[o[j],o[idx]];
  local.order=o;
  render();
}
function localReveal(){
  const o=local.order;
  let success=true;
  for(let i=0;i<o.length-1;i++){
    if(local.players[o[i]].number > local.players[o[i+1]].number){ success=false; break; }
  }
  local.phase='reveal';
  local.lastResult={success};
  local.history=(local.history||[]).concat([success]);
  render();
}
function localGoTopicPick(){ local.phase='retopic'; render(); }
function localSetTopicMode(m){
  local.topicMode=m; local.pendingTopic=null;
  if(m==='community') ensureCommunityPickLoaded(currentLang());
  render();
}
function localChoosePreset(idx){ local.pendingTopic=topicsFor(currentLang())[idx]; render(); }
function localChooseCommunity(idx){
  const c=(communitySampleCache[currentLang()]||[])[idx];
  if(!c) return;
  local.pendingTopic={text:c.text, low:c.low, high:c.high};
  render();
}
function localSaveCustomTopic(){
  const l=currentLang();
  const text=(document.getElementById('lct-text').value||'').trim().slice(0,28);
  const low=(document.getElementById('lct-low').value||'').trim().slice(0,10)||defaultLow(l);
  const high=(document.getElementById('lct-high').value||'').trim().slice(0,10)||defaultHigh(l);
  const share=!!(document.getElementById('lct-share')||{}).checked;
  if(!text){ errorMsg=t('err_topicTextRequired'); render(); return; }
  local.pendingTopic={text, low, high};
  errorMsg='';
  if(share) safeWrite(()=>push(communityRef(l), {text, low, high, addedAt:Date.now()}));
  beginLocalRound();
  render();
}
function localStartNextRound(){
  if(local.topicMode==='presetRandom'){ beginLocalRound(); render(); }
  else { localGoTopicPick(); }
}

    html += `<div class="topic-chip-grid">` + list.map((tp,i)=>`<button class="topic-chip ${cfg.selectedText===tp.text?'selected':''}" onclick="${cfg.onPickPreset}(${i})">${esc(tp.text)}<small>${esc(tp.low)} → ${esc(tp.high)}</small></button>`).join('') + `</div>`;

    } else if(sample.length===0){
      html += `<p class="helper">${tl(l,'communityEmpty')}</p>`;
    } else {
      html += `<div class="topic-chip-grid">` + sample.map((tp,i)=>`<button class="topic-chip ${cfg.selectedText===tp.text?'selected':''}" onclick="${cfg.onPickCommunity}(${i})">${esc(tp.text)}<small>${esc(tp.low)} → ${esc(tp.high)}</small></button>`).join('') + `</div>`;
      html += `<button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="communityShuffle()">${tl(l,'communityShuffleBtn')}</button>`;
    }

    html += `<div class="field"><input id="${cfg.idPrefix}-text" class="input" maxlength="28" placeholder="${tl(l,'customTextPlaceholder')}"></div>

function renderOrderAndReveal(playersObj, order, topic, phase, round, history, hostAllowed, cb){
  let html='';
  html += renderHistoryDots(history);
  html += `<div class="round-pill">${roundLabel(round)}</div>`;
  html += `<div class="topic-banner"><div class="ttext">${esc(topic.text)}</div>

    html += `<p class="subtitle">${t('orderInstructions')}</p>`;

    </div>`;
    html += `<div class="thread-wrap">`;
    order.forEach((id,idx)=>{
      const p=playersObj[id];
      html += `<div class="order-card"><div class="oc-row">
        <div style="flex:1;">
          <div class="ocname"><span>${esc(p.name)}</span></div>

        </div>
        <div class="order-controls">
          <button onclick="${cb.move}(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
          <button onclick="${cb.move}(${idx},1)" ${idx===order.length-1?'disabled':''}>▼</button>
        </div>
      </div></div>`;
    });
    html += `</div>`;
    html += `<div class="order-anchor order-anchor-bottom">
      <span>${t('orderHighLabel')}</span>
      <span style="opacity:0.5;font-size:11px;">${esc(topic.high)}</span>
    </div>`;
    if(hostAllowed){
      html += `<button class="btn btn-primary" onclick="${cb.reveal}()">${t('judgeBtn')}</button>`;
    } else {
      html += `<div class="helper">${t('waitingHostJudgeText')}</div>`;
    }
  } else if(phase==='reveal'){
    const success = order.every((id,idx)=> idx===order.length-1 || playersObj[id].number < playersObj[order[idx+1]].number);
    html += `<div class="result-banner ${success?'success':'fail'}"><div class="big">${success?t('successBannerText'):t('failBannerText')}</div></div>`;
    html += `<div class="thread-wrap">`;

      html += `<div class="order-card"><div class="oc-row"><div style="flex:1;">

        <div class="occlue">${p.clue ? esc(p.clue) : ''}</div>

      }
    });
    html += `</div>`;
    if(hostAllowed){
      html += `<button class="btn btn-primary" onclick="${cb.next}()">${t('playAgainBtn')}</button>`;
    } else {
      html += `<div class="helper">${t('waitingNextRoundText')}</div>`;
    }
  }
  return html;
}

      <div class="number-display">${me.number}</div></div>`;
    html += renderErrorBanner();
    if(!me.submitted){
      html += `<div class="field"><label class="label">${t('clueLabel')}</label>
        <textarea id="clue-input" class="input" placeholder="${t('cluePlaceholder')}"></textarea></div>`;
      html += `<button class="btn btn-primary" onclick="submitClueAction()">${t('submitClueBtn')}</button>`;
    } else {
      html += `<p class="subtitle">${t('waitingOthersText')}</p>`;
    }
    const submittedCount = Object.values(room.players).filter(p=>p.submitted).length;
    html += `<div class="helper">${submittedCountText(submittedCount, Object.keys(room.players).length)}</div>`;
    return html;
  }

  if(room.phase==='order' || room.phase==='reveal'){
    html += renderOrderAndReveal(room.players, room.order, room.topic, room.phase, room.round, room.history, isHost(), {move:'moveOrder', reveal:'hostReveal', next:'hostNextRound'});
    return html;
  }

  return html;
}

function renderLocalMode(){
  let html = `<div class="topbar"><div class="brand"><span class="thread-dot"></span>ito-line</div>
    <button class="linkbtn" onclick="goTitle()">${t('homeLink')}</button></div>`;

  if(localStep==='setup'){
    const l=currentLang();
    html += `<div class="lang-row">
      <button class="${lang==='ja'?'active':''}" onclick="setLang('ja')">日本語</button>
      <button class="${lang==='en'?'active':''}" onclick="setLang('en')">English</button>
    </div>`;
    html += `<h2>${t('localSetupHeading')}</h2>`;
    html += `<p class="subtitle">${t('localSetupSubtitle')}</p>`;
    html += `<div class="card">
      <label class="label">${t('playerCountLabel')}</label>
      <div class="count-stepper">
        <button onclick="setLocalCount(-1)">−</button>
        <span class="num">${localCount}</span>
        <button onclick="setLocalCount(1)">＋</button>
      </div>
      <div class="name-rows">`;
    for(let i=0;i<localCount;i++){
      html += `<input id="ln-${i}" class="input" maxlength="12" placeholder="${playerPlaceholder(i+1)}" value="${esc(localNames[i]||'')}">`;
    }
    html += `</div></div>`;
    html += `<div class="card"><h2 style="font-size:15px;">${t('topicSectionHeading')}</h2>`;
    html += topicModeSelector({mode:(local&&local.topicMode)||'presetRandom', lang:l, onMode:'localSetTopicModeBeforeStart', onPickPreset:'localChoosePresetBeforeStart', onPickCommunity:'localChooseCommunityBeforeStart', onSaveCustom:'localSaveCustomBeforeStart', idPrefix:'lct0', selectedText: (local&&local.pendingTopic)?local.pendingTopic.text:null});
    html += `</div>`;
    html += renderErrorBanner();
    html += `<button class="btn btn-primary" onclick="startLocalGame()">${t('startLocalBtn')}</button>`;
    return html;
  }

  if(!local) return html;

  if(local.phase==='pass'){
    const ids=Object.keys(local.players);
    const id=ids[local.passIdx];
    const p=local.players[id];
    html += `<div class="round-pill">${roundLabel(local.round)}</div>`;
    html += `<div class="card" style="text-align:center;padding:34px 18px;">
      <div style="font-size:15px;color:var(--ink-soft);margin-bottom:10px;">${t('nextTurnLabel')}</div>
      <div style="font-size:23px;font-weight:900;margin-bottom:18px;">${esc(withHonorific(p.name))}</div>
      <p style="font-size:13px;color:var(--ink-soft);">${t('passInstructions')}</p>
      <button class="btn btn-secondary" style="margin-top:10px;" onclick="localRevealOwnNumber()">${t('revealNumberBtn')}</button>
    </div>`;
    return html;
  }

  if(local.phase==='pass-show'){
    const ids=Object.keys(local.players);
    const id=ids[local.passIdx];
    const p=local.players[id];
    html += `<div class="topic-banner"><div class="ttext">${esc(local.topic.text)}</div>
      <div class="scale"><span>${esc(local.topic.low)}</span><span>${esc(local.topic.high)}</span></div></div>`;
    html += `<div class="card number-stage"><div class="lab">${numberOfLabel(esc(p.name))}</div>
      <div class="number-display">${p.number}</div></div>`;
    html += `<div class="field"><label class="label">${t('clueLabel')}</label>
      <textarea id="lc-input" class="input" placeholder="${t('cluePlaceholder')}"></textarea></div>`;
    html += `<button class="btn btn-primary" onclick="localSubmitClue()">${t('decideAndPassBtn')}</button>`;
    return html;
  }

  if(local.phase==='retopic'){
    const l=currentLang();
    html += `<h2>${t('retopicHeading')}</h2>`;
    html += `<div class="card">`;
    html += topicModeSelector({mode:local.topicMode, lang:l, onMode:'localSetTopicMode', onPickPreset:'localChoosePreset', onPickCommunity:'localChooseCommunity', onSaveCustom:'localSaveCustomTopic', idPrefix:'lct', selectedText: local.pendingTopic ? local.pendingTopic.text : null});
    html += `</div>`;
    html += renderErrorBanner();
    if(local.topicMode!=='custom'){
      html += `<button class="btn btn-primary" onclick="beginLocalRound();render();">${t('thisTopicStartBtn')}</button>`;
    }
    return html;
  }

  if(local.phase==='order' || local.phase==='reveal'){
    html += renderOrderAndReveal(local.players, local.order, local.topic, local.phase, local.round, local.history, true, {move:'localMoveOrder', reveal:'localReveal', next:'localStartNextRound'});
    return html;
  }

  return html;
}

/* ---------- expose handlers for inline HTML event attributes ----------
   (top-level functions in a module script are NOT auto-attached to window,
   unlike a classic script — so anything referenced from onclick="..." in
   the templates above must be explicitly exported here.) */
Object.assign(window, {
  setLang, goBank, goHelp, bankAddTopic, communityShuffle,
  beginLocalRound, copyCode, createRoomAction, goLocalSetup, goOnlineHome, goTitle,
  hostStartRound, joinRoomAction, localRevealOwnNumber, localSubmitClue, render,
  retrySync, setLocalCount, startLocalGame, submitClueAction, toggleHelp,
  moveOrder, hostReveal, hostNextRound, localMoveOrder, localReveal, localStartNextRound,
  hostSetTopicMode, hostChoosePreset, hostSaveCustomTopic, hostChooseCommunity,
  localSetTopicModeBeforeStart, localChoosePresetBeforeStart, localSaveCustomBeforeStart, localChooseCommunityBeforeStart,
  localSetTopicMode, localChoosePreset, localSaveCustomTopic, localChooseCommunity
});

/* ---------- init ---------- */
render();
initAuth();
</script>
